services:
  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
      # NEXT_PUBLIC_* vars must be build-time so Next.js inlines them into
      # the client bundle. Also passed as runtime env below for SSR and
      # server-side features that read them at request time.
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
        NEXT_PUBLIC_SUPABASE_URL: ${SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
      - NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
    depends_on:
      api-node:
        condition: service_healthy
    restart: unless-stopped

  api-node:
    build:
      context: .
      dockerfile: ./apps/api-node/Dockerfile
    ports:
      - '3001:3001'
    environment:
      - DATABASE_URL=${SUPABASE_DATABASE_URL}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - PYTHON_SERVICE_URL=http://api-python:8000
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - REDIS_URL=redis://redis:6379
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      api-python:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  api-python:
    build:
      context: .
      dockerfile: ./apps/api-python/Dockerfile
    # No ports exposed to host — internal service only
    # In production, this is on Railway private networking
    expose:
      - '8000'
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - VOYAGE_API_KEY=${VOYAGE_API_KEY}
      - DATABASE_URL=${SUPABASE_DATABASE_URL}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - ENVIRONMENT=development
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
