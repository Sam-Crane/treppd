name: CI
on:
  pull_request:
    branches: [main, develop]
  workflow_call:

jobs:
  lint-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npx turbo lint --filter=web

  lint-node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npx turbo lint --filter=api-node

  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install ruff
      - run: cd apps/api-python && ruff check .

  test-node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - name: Unit tests with coverage
        working-directory: apps/api-node
        run: npm run test:cov
      - name: E2E tests
        working-directory: apps/api-node
        env:
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_SECRET_KEY: sb_secret_test
          PYTHON_SERVICE_URL: http://localhost:8000
          INTERNAL_API_KEY: test-internal-key-long-enough-16
          FRONTEND_URL: http://localhost:3000
        run: npm run test:e2e
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-node
          path: apps/coverage/

  test-python:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: https://test.supabase.co
      SUPABASE_SECRET_KEY: sb_secret_test
      ANTHROPIC_API_KEY: test-anthropic-key
      INTERNAL_API_KEY: test-internal-key-long-enough-16
      ENVIRONMENT: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r apps/api-python/requirements-dev.txt
      - name: Run tests with coverage
        working-directory: apps/api-python
        run: |
          pytest tests/ \
            --cov=services --cov=routers --cov=config \
            --cov-report=term --cov-report=xml \
            --cov-fail-under=60
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-python
          path: apps/api-python/coverage.xml

  build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npx turbo build

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for leaked secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
