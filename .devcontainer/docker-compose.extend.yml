# Devcontainer workspace — runs independently of the app services.
#
# App services (web, api-node, api-python, redis) are NOT started
# automatically. Run `docker compose up` manually when needed.
# This keeps Codespace startup fast (<60s vs 5-10 min).
services:
  workspace:
    image: mcr.microsoft.com/devcontainers/base:ubuntu-22.04
    volumes:
      - ..:/workspace:cached
      - /var/run/docker.sock:/var/run/docker-host.sock
    command: sleep infinity
